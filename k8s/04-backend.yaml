apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubemanage-backend
  namespace: kubemanage
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: kubemanage-backend
  template:
    metadata:
      labels:
        app: kubemanage-backend
    spec:
      serviceAccountName: kubemanage-backend
      nodeSelector:
        kubernetes.io/hostname: node234
      initContainers:
        - name: wait-for-mysql
          image: docker.io/library/kubemanage-mysql:5.7
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - until mysqladmin ping -h kubemanage-mysql -u kubemanage -p"$MYSQL_PASSWORD" --silent; do sleep 3; done
          env:
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kubemanage-secrets
                  key: mysql-password
      containers:
        - name: backend
          image: docker.io/library/kubemanage-backend:v1.0.0
          imagePullPolicy: IfNotPresent
          env:
            - name: KUBEMANAGE_CONFIG
              value: /etc/kubemanage/config.yaml
            - name: KUBEMANAGE_MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kubemanage-secrets
                  key: mysql-password
            - name: KUBEMANAGE_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: kubemanage-secrets
                  key: jwt-secret
          ports:
            - name: http
              containerPort: 6180
          startupProbe:
            tcpSocket:
              port: http
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: config
              mountPath: /etc/kubemanage
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: kubemanage-backend-config
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: kubemanage-backend
  namespace: kubemanage
spec:
  type: ClusterIP
  selector:
    app: kubemanage-backend
  ports:
    - name: http
      port: 6180
      targetPort: http
